<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ewha Capstone Design 2026</title>
  <!-- GitHub Markdown CSS (GitHub 스타일 그대로) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown.min.css">
  <style>
    body { max-width: 900px; margin: 40px auto; padding: 0 20px; }
  </style>
</head>
<body class="markdown-body">
  <div id="content">Loading...</div>

  <!-- marked.js: MD → HTML 변환 라이브러리 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
  <script>
    fetch('project briefs.md')
      .then(res => res.text())
      .then(md => {
        document.getElementById('content').innerHTML = marked.parse(md);
      })
      .catch(() => {
        document.getElementById('content').innerHTML = '<p>project_brief.md 파일을 불러올 수 없습니다.</p>';
      });
  </script>
</body>
</html>
